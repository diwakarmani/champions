services:
  - type: web
    name: property-management-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeploy: true

    envVars:
      # ── MANUAL SERVICE SETUP (if not using Blueprint) ─────────────────────
      # render.yaml env vars are IGNORED for manually-created services.
      # You MUST set ALL of the following in Render Dashboard manually:
      #   Dashboard → Service → Environment → Add Environment Variable
      #
      # Required env vars for manual service:
      #   DATABASE_URL = jdbc:postgresql://db.vqafsihxcryolxwysmfp.supabase.co:5432/postgres?sslmode=require
      #   DB_USERNAME  = postgres
      #   DB_PASSWORD  = <your supabase password>
      #   DDL_AUTO     = none
      #   JWT_SECRET   = <any long random string>
      #   ADMIN_EMAIL  = <your admin email>
      #   ADMIN_PASSWORD = <your admin password>
      #   APP_BASE_URL = https://<your-render-service>.onrender.com
      #   CORS_ALLOWED_ORIGINS = *
      #   CORS_ALLOW_CREDENTIALS = false
      #   HEALTH_MAIL_ENABLED = false
      #   TWILIO_ENABLED = false
      # ──────────────────────────────────────────────────────────────────────

      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DDL_AUTO
        value: none
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: HEALTH_MAIL_ENABLED
        value: "false"
      - key: TWILIO_ENABLED
        value: "false"
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_APP
        value: INFO
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_POOL_MIN
        value: "1"

      # ── Database (non-secret — project ref is already public in your URL) ─
      - key: DATABASE_URL
        value: jdbc:postgresql://db.vqafsihxcryolxwysmfp.supabase.co:5432/postgres?sslmode=require
      - key: DB_USERNAME
        value: postgres

      # ── JWT: auto-generated by Render on Blueprint deploy ─────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── ONLY these must be set manually in Render dashboard ───────────────
      - key: DB_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
