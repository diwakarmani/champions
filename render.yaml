services:
  - type: web
    name: property-management-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeploy: true

    envVars:
      # ── Safe defaults — committed, no secrets ─────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DDL_AUTO
        value: update
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: HEALTH_MAIL_ENABLED
        value: "false"
      - key: TWILIO_ENABLED
        value: "false"
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_APP
        value: INFO
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_POOL_MIN
        value: "1"

      # ── JWT: auto-generated by Render on first deploy ─────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── REQUIRED SECRETS — must be set in Render dashboard before deploying
      # Dashboard → your service → Environment → Add Environment Variable
      #
      # DATABASE_URL  = jdbc:postgresql://db.vqafsihxcryolxwysmfp.supabase.co:5432/postgres?sslmode=require
      # DB_USERNAME   = postgres
      # DB_PASSWORD   = <your supabase password>
      # ADMIN_EMAIL   = admin@propertyapp.com
      # ADMIN_PASSWORD= <your admin password>
      # APP_BASE_URL  = https://<your-service>.onrender.com  (set after first deploy)
      # MAIL_USERNAME = <gmail address>
      # MAIL_PASSWORD = <gmail app password>
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
