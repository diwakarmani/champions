services:
  - type: web
    name: property-management-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeploy: true

    envVars:
      # ── All non-secret config committed here ──────────────────────────────
      # NOTE: render.yaml env vars only apply to Blueprint services.
      # If you created the service manually, set these in the Render dashboard:
      #   Dashboard → Service → Environment → Add Environment Variable

      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DDL_AUTO
        value: update
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: HEALTH_MAIL_ENABLED
        value: "false"
      - key: TWILIO_ENABLED
        value: "false"
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: LOG_LEVEL_APP
        value: INFO
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_POOL_MIN
        value: "1"

      # ── Database (non-secret — project ref is already public in your URL) ─
      - key: DATABASE_URL
        value: jdbc:postgresql://db.vqafsihxcryolxwysmfp.supabase.co:5432/postgres?sslmode=require
      - key: DB_USERNAME
        value: postgres

      # ── JWT: auto-generated by Render on Blueprint deploy ─────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── ONLY these must be set manually in Render dashboard ───────────────
      - key: DB_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
